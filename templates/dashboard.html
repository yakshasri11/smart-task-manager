<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | TaskManager</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/dashboard.css" />
  <!-- socket.io client for real-time updates -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

  
  <nav class="navbar">
    <div class="nav-left">
      <span class="nav-logo">📝 TaskManager</span>
    </div>
    <div class="nav-right">
      <span class="nav-user">Hello, <strong>{{ username }}</strong></span>
      <span class="live-badge" id="live-badge">● Live</span>
      <button id="logout-btn">Logout</button>
    </div>
  </nav>

  <div class="page-wrapper">

    <!-- analytics section -->
    <section class="analytics-section">
      <h2 class="section-title">Overview</h2>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <p class="stat-label">Total Tasks</p>
          <p class="stat-value" id="stat-total">-</p>
        </div>
        <div class="stat-card completed">
          <p class="stat-label">Completed</p>
          <p class="stat-value" id="stat-done">-</p>
        </div>
        <div class="stat-card pending">
          <p class="stat-label">Pending</p>
          <p class="stat-value" id="stat-pending">-</p>
        </div>
        <div class="stat-card progress-card">
          <p class="stat-label">Completion Rate</p>
          <p class="stat-value" id="stat-pct">-</p>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </section>

    
    <div class="content-grid">

      
      <aside class="add-task-panel">
        <h2 class="section-title">Add Task</h2>

        <div class="form-group">
          <label>Title <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="What needs to be done?" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="task-desc" rows="3" placeholder="Add more details (optional)"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="task-status">
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>

        <button id="add-btn" class="btn-add">+ Add Task</button>

        <div id="form-msg" class="form-msg hidden"></div>
      </aside>

      <!-- task list -->
      <main class="task-list-panel">
        <div class="list-header">
          <h2 class="section-title">My Tasks</h2>
          <div class="filter-group">
            <button class="filter-btn active" data-f="all">All</button>
            <button class="filter-btn" data-f="pending">Pending</button>
            <button class="filter-btn" data-f="in_progress">In Progress</button>
            <button class="filter-btn" data-f="completed">Completed</button>
          </div>
        </div>

        <div id="task-list">
          
        </div>
      </main>

    </div>
  </div>

  <!-- edit modal -->
  <div id="edit-modal" class="modal-bg hidden">
    <div class="modal-box">
      <h3>Edit Task</h3>
      <input type="hidden" id="edit-id" />

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="edit-desc" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Priority</label>
          <select id="edit-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="edit-status">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>
      <div class="modal-btns">
        <button id="cancel-edit" class="btn-cancel">Cancel</button>
        <button id="save-edit" class="btn-save">Save Changes</button>
      </div>
    </div>
  </div>

  
  <div id="toast" class="toast hidden"></div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
