<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TaskManager</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/auth.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">📝</span>
        <h1>TaskManager</h1>
      </div>
      <p class="tagline">Sign in to your account</p>

      <div id="msg-box" class="msg-box hidden"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button id="login-btn" class="btn-main">Sign In</button>

      <p class="alt-text">Don't have an account? <a href="/register">Create one</a></p>
    </div>
  </div>

  <script>
    const msgBox  = document.getElementById('msg-box');
    const emailEl = document.getElementById('email');
    const passEl  = document.getElementById('password');
    const btn     = document.getElementById('login-btn');

    function showMsg(text, type) {
      msgBox.textContent  = text;
      msgBox.className    = `msg-box ${type}`;
    }

    btn.addEventListener('click', async () => {
      const email    = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        showMsg('Please fill in all fields', 'error');
        return;
      }

      btn.textContent = 'Signing in...';
      btn.disabled    = true;

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          showMsg('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/', 1000);
        } else {
          showMsg(data.error || 'Login failed', 'error');
          btn.textContent = 'Sign In';
          btn.disabled    = false;
        }
      } catch (err) {
        showMsg('Network error. Try again.', 'error');
        btn.textContent = 'Sign In';
        btn.disabled    = false;
      }
    });

    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
